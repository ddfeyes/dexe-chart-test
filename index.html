<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXE/USDT Chart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        header {
            text-align: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #58a6ff;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 800px;
            background: #161b22;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat {
            text-align: center;
            flex: 1;
            min-width: 120px;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .stat-value.positive {
            color: #3fb950;
        }
        .stat-value.negative {
            color: #f85149;
        }
        .chart-container {
            width: 100%;
            max-width: 1000px;
            height: 500px;
            background: #161b22;
            border-radius: 8px;
            overflow: hidden;
        }
        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
            text-align: center;
            width: 100%;
            max-width: 800px;
        }
        @media (max-width: 600px) {
            .stats {
                flex-direction: column;
            }
            .stat {
                min-width: unset;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>DEXE/USDT</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Price (USDT)</div>
                <div class="stat-value" id="price">--</div>
            </div>
            <div class="stat">
                <div class="stat-label">24h Change</div>
                <div class="stat-value" id="change">--</div>
            </div>
            <div class="stat">
                <div class="stat-label">24h Volume</div>
                <div class="stat-value" id="volume">--</div>
            </div>
        </div>
    </header>
    <div class="chart-container">
        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container">
          <div id="tradingview_chart"></div>
          <div class="tradingview-widget-copyright"><a href="https://www.tradingview.com/symbols/BINANCE-DEXEUSDT/" rel="noopener" target="_blank"><span class="blue-text">DEXEUSDT Chart</span></a> by TradingView</div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
          new TradingView.widget(
          {
          "autosize": true,
          "symbol": "BINANCE:DEXEUSDT",
          "interval": "D",
          "timezone": "Etc/UTC",
          "theme": "dark",
          "style": "1",
          "locale": "en",
          "toolbar_bg": "#f1f3f6",
          "enable_publishing": false,
          "hide_top_toolbar": false,
          "hide_legend": true,
          "save_image": false,
          "container_id": "tradingview_chart"
          }
          );
          </script>
        </div>
        <!-- TradingView Widget END -->
    </div>
    <footer>
        Data provided by CoinGecko & TradingView<br>
        Last updated: <span id="timestamp">--</span>
    </footer>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=dexe&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true');
                const data = await response.json();
                const dexe = data.dexe;
                if (dexe) {
                    document.getElementById('price').textContent = `$${dexe.usd.toFixed(4)}`;
                    const change = dexe.usd_24h_change;
                    const changeEl = document.getElementById('change');
                    changeEl.textContent = `${change.toFixed(2)}%`;
                    changeEl.className = 'stat-value ' + (change >= 0 ? 'positive' : 'negative');
                    document.getElementById('volume').textContent = `$${dexe.usd_24h_vol.toLocaleString()}`;
                    document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
                }
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // Fetch data every 30 seconds
        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
