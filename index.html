<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEXE/USDT — Live Chart</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      max-width: 1200px;
      padding: 20px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pair-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .pair-logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #161b22;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      border: 1px solid #30363d;
    }

    .pair-name {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .pair-exchange {
      font-size: 12px;
      color: #8b949e;
      background: #161b22;
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid #30363d;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: right;
    }

    .stat-label {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .stat-change {
      font-size: 15px;
      font-weight: 600;
    }

    .stat-change.up   { color: #3fb950; }
    .stat-change.down { color: #f85149; }

    .chart-wrapper {
      width: 100%;
      max-width: 1200px;
      padding: 0 24px;
    }

    #chart {
      width: 100%;
      height: 520px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #30363d;
    }

    .controls {
      width: 100%;
      max-width: 1200px;
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls label {
      font-size: 13px;
      color: #8b949e;
    }

    .controls select {
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .controls select:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .controls .spacer { flex: 1; }

    .status-bar {
      width: 100%;
      max-width: 1200px;
      padding: 0 24px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: #8b949e;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      animation: pulse 2s infinite;
    }

    .status-dot.error { background: #f85149; animation: none; }
    .status-dot.loading { background: #d29922; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .footer {
      width: 100%;
      max-width: 1200px;
      padding: 0 24px 24px;
      font-size: 11px;
      color: #484f58;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="pair-info">
    <div class="pair-logo">Ð</div>
    <span class="pair-name">DEXE / USDT</span>
    <span class="pair-exchange">CoinGecko</span>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Price</div>
      <div class="stat-value" id="price">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">24h Change</div>
      <div class="stat-change up" id="change">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">24h Volume</div>
      <div class="stat-value" id="volume">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Market Cap</div>
      <div class="stat-value" id="mcap">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">ATH</div>
      <div class="stat-value" id="ath">—</div>
    </div>
  </div>
</div>

<div class="controls">
  <label>Timeframe:</label>
  <select id="timeframe">
    <option value="1">1 minute</option>
    <option value="5">5 minutes</option>
    <option value="15">15 minutes</option>
    <option value="30">30 minutes</option>
    <option value="60" selected>1 hour</option>
    <option value="240">4 hours</option>
    <option value="1440">1 day</option>
  </select>
  <div class="spacer"></div>
  <span id="last-update" style="font-size:12px;color:#8b949e;"></span>
</div>

<div class="chart-wrapper">
  <div id="chart"></div>
</div>

<div class="status-bar">
  <div class="status-dot loading" id="dot"></div>
  <span id="status-text">Connecting to CoinGecko…</span>
</div>

<div class="footer">
  Data provided by CoinGecko · Chart by TradingView Lightweight Charts
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const COINGECKO_ID = 'dexe';
const REFRESH_MS   = 30_000;
let currentTf      = 60;
let chartApi       = null;
let candleSeries   = null;
let volumeSeries   = null;
let refreshTimer   = null;

// ─── CoinGecko ────────────────────────────────────────────────────────────────
async function fetchMarket() {
  const url = `https://api.coingecko.com/api/v3/coins/${COINGECKO_ID}?localization=false&tickers=false&community_data=false&developer_data=false`;
  const r   = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchOHLC(tfMinutes) {
  const days = tfMinutes <= 60 ? 1 : tfMinutes <= 1440 ? 7 : 30;
  const url  = `https://api.coingecko.com/api/v3/coins/${COINGECKO_ID}/ohlc?vs_currency=usd&days=${days}`;
  const r    = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json(); // [[timestamp, open, high, low, close], …]
}

// ─── Chart Setup ─────────────────────────────────────────────────────────────
function initChart() {
  const container = document.getElementById('chart');
  container.innerHTML = '';

  const chart = LightweightCharts.createChart(container, {
    width:  container.clientWidth,
    height: 520,
    layout: {
      background: { type: 'solid', color: '#0d1117' },
      textColor:  '#8b949e',
    },
    grid: {
      vertLines:   { color: '#161b22' },
      horzLines:   { color: '#161b22' },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#58a6ff', labelBackgroundColor: '#1f6feb' },
      horzLine: { color: '#58a6ff', labelBackgroundColor: '#1f6feb' },
    },
    rightPriceScale: {
      borderColor: '#30363d',
      scaleMargins: { top: 0.08, bottom: 0.25 },
    },
    timeScale: {
      borderColor:    '#30363d',
      timeVisible:    true,
      secondsVisible: false,
    },
  });

  candleSeries = chart.addCandlestickSeries({
    upColor:          '#3fb950',
    downColor:        '#f85149',
    borderUpColor:    '#3fb950',
    borderDownColor:  '#f85149',
    wickUpColor:      '#3fb950',
    wickDownColor:    '#f85149',
  });

  volumeSeries = chart.addHistogramSeries({
    color:         '#3fb95066',
    priceFormat:   { type: 'volume' },
    priceScaleId:  'volume',
  });
  chart.priceScale('volume').applyOptions({
    scaleMargins: { top: 0.8, bottom: 0 },
  });

  // Resize observer
  const ro = new ResizeObserver(() => {
    chart.applyOptions({ width: container.clientWidth });
  });
  ro.observe(container);

  return chart;
}

// ─── Format Helpers ───────────────────────────────────────────────────────────
function fmt(num, decimals = 2) {
  if (num === null || num === undefined) return '—';
  if (num >= 1e9)  return (num / 1e9).toFixed(2) + 'B';
  if (num >= 1e6)  return (num / 1e6).toFixed(2) + 'M';
  if (num >= 1e3)  return (num / 1e3).toFixed(2) + 'K';
  return num.toFixed(decimals);
}

function fmtPct(v) {
  if (v === null || v === undefined) return '—';
  const sign = v >= 0 ? '+' : '';
  return `${sign}${v.toFixed(2)}%`;
}

// ─── Update Stats ─────────────────────────────────────────────────────────────
function updateStats(data) {
  const usd   = data.market_data;
  const price = usd.current_price.usd;

  document.getElementById('price').textContent  = '$' + fmt(price, price < 1 ? 4 : 2);

  const chg = usd.price_change_percentage_24h;
  const chgEl = document.getElementById('change');
  chgEl.textContent = fmtPct(chg);
  chgEl.className = 'stat-change ' + (chg >= 0 ? 'up' : 'down');

  document.getElementById('volume').textContent = '$' + fmt(usd.total_volume.usd);
  document.getElementById('mcap').textContent   = '$' + fmt(usd.market_cap.usd);
  document.getElementById('ath').textContent    = '$' + fmt(usd.ath.usd, price < 1 ? 4 : 2);

  const updated = new Date(data.last_updated);
  document.getElementById('last-update').textContent =
    'Updated: ' + updated.toLocaleTimeString();
}

// ─── Update Chart ─────────────────────────────────────────────────────────────
function updateChart(ohlcData) {
  // CoinGecko returns [timestamp_ms, open, high, low, close]
  const candleData = ohlcData.map(([t, o, h, l, c]) => ({
    time:  Math.floor(t / 1000),
    open:  o,
    high:  h,
    low:   l,
    close: c,
  }));

  const volData = ohlcData.map(([t, o, , , c]) => ({
    time:  Math.floor(t / 1000),
    value: Math.abs(c - o),
    color: c >= o ? '#3fb95044' : '#f8514944',
  }));

  candleSeries.setData(candleData);
  volumeSeries.setData(volData);

  if (candleData.length > 0) {
    chartApi.timeScale().scrollToRealTime();
  }
}

// ─── Status ───────────────────────────────────────────────────────────────────
function setStatus(text, type) {
  // type: 'ok' | 'error' | 'loading'
  const dot  = document.getElementById('dot');
  const tEl  = document.getElementById('status-text');
  dot.className  = 'status-dot ' + (type === 'error' ? 'error' : type === 'loading' ? 'loading' : '');
  tEl.textContent = text;
}

// ─── Load ─────────────────────────────────────────────────────────────────────
async function load() {
  setStatus('Fetching market data…', 'loading');
  try {
    const [market, ohlc] = await Promise.all([
      fetchMarket(),
      fetchOHLC(currentTf),
    ]);

    updateStats(market);
    updateChart(ohlc);
    setStatus('Live · auto-refreshes every 30s', 'ok');
  } catch (err) {
    console.error(err);
    setStatus('Error: ' + err.message, 'error');
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
const chartEl = document.getElementById('chart');
chartApi = initChart();

document.getElementById('timeframe').addEventListener('change', e => {
  currentTf = parseInt(e.target.value, 10);
  clearInterval(refreshTimer);
  load().then(() => {
    refreshTimer = setInterval(load, REFRESH_MS);
  });
});

load();
refreshTimer = setInterval(load, REFRESH_MS);
</script>
</body>
</html>
