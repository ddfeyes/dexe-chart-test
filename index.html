<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEXE/USDT Price Chart — agent3 (minimax)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e1a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #1a1f35, #0d1224);
      border-bottom: 1px solid #2a3550;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: #fff;
    }
    .header-title { font-size: 22px; font-weight: 700; }
    .header-sub { font-size: 13px; color: #64748b; margin-top: 2px; }
    .badge {
      margin-left: auto;
      background: #1e2840;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      color: #94a3b8;
    }
    .main { flex: 1; padding: 24px 32px; display: flex; flex-direction: column; gap: 20px; }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }
    .stat-card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: #334155; }
    .stat-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-change { font-size: 13px; margin-top: 4px; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .neutral { color: #94a3b8; }
    .chart-card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 24px;
      flex: 1;
    }
    .chart-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .chart-title { font-size: 16px; font-weight: 600; }
    .timeframes { display: flex; gap: 6px; }
    .tf-btn {
      background: none; border: 1px solid #1e293b;
      color: #64748b; border-radius: 6px;
      padding: 5px 10px; font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .tf-btn.active, .tf-btn:hover {
      background: #6366f1; border-color: #6366f1; color: #fff;
    }
    canvas { width: 100% !important; }
    .footer { padding: 16px 32px; text-align: center; font-size: 12px; color: #334155; border-top: 1px solid #1a2035; }
    .loading { color: #475569; text-align: center; padding: 40px; }
    .error-msg { color: #ef4444; text-align: center; padding: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">D</div>
    <div>
      <div class="header-title">DEXE / USDT</div>
      <div class="header-sub">DeXe Protocol — Live Price Dashboard</div>
    </div>
    <div class="badge">agent3 · minimax</div>
  </header>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Price (USD)</div>
        <div class="stat-value" id="price">—</div>
        <div class="stat-change" id="change24h">Loading…</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Market Cap</div>
        <div class="stat-value" id="mcap" style="font-size:20px">—</div>
        <div class="stat-change neutral" id="mcap-rank">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">24h Volume</div>
        <div class="stat-value" id="vol24" style="font-size:20px">—</div>
        <div class="stat-change" id="vol-change">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">24h High / Low</div>
        <div class="stat-value" id="high24" style="font-size:20px">—</div>
        <div class="stat-change neutral" id="low24">Low: —</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Price History</div>
        <div class="timeframes">
          <button class="tf-btn" data-days="1">1D</button>
          <button class="tf-btn active" data-days="7">7D</button>
          <button class="tf-btn" data-days="30">30D</button>
          <button class="tf-btn" data-days="90">90D</button>
        </div>
      </div>
      <canvas id="priceChart" height="280"></canvas>
      <div class="loading" id="chartLoading">Loading chart data…</div>
      <div class="error-msg" id="chartError" style="display:none"></div>
    </div>
  </div>

  <div class="footer">Data: CoinGecko API · Refreshes every 60s · agent3 (minimax)</div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    const fmt = (n, d=2) => n == null ? '—' : Number(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
    const fmtB = n => { if (!n) return '—'; if (n>=1e9) return '$'+fmt(n/1e9,2)+'B'; if (n>=1e6) return '$'+fmt(n/1e6,2)+'M'; return '$'+fmt(n,0); };

    let chart = null;

    async function fetchStats() {
      try {
        const r = await fetch('https://api.coingecko.com/api/v3/coins/dexe?localization=false&tickers=false&community_data=false&developer_data=false');
        const d = await r.json();
        const m = d.market_data;

        document.getElementById('price').textContent = '$' + fmt(m.current_price.usd, 4);
        
        const ch = m.price_change_percentage_24h;
        const chEl = document.getElementById('change24h');
        chEl.textContent = (ch >= 0 ? '+' : '') + fmt(ch, 2) + '% (24h)';
        chEl.className = 'stat-change ' + (ch >= 0 ? 'positive' : 'negative');

        document.getElementById('mcap').textContent = fmtB(m.market_cap.usd);
        document.getElementById('mcap-rank').textContent = 'Rank #' + d.market_cap_rank;
        document.getElementById('vol24').textContent = fmtB(m.total_volume.usd);
        document.getElementById('high24').textContent = '$' + fmt(m.high_24h.usd, 4);
        document.getElementById('low24').textContent = 'Low: $' + fmt(m.low_24h.usd, 4);
      } catch(e) {
        console.warn('Stats fetch failed', e);
      }
    }

    async function fetchChart(days) {
      document.getElementById('chartLoading').style.display = 'block';
      document.getElementById('chartError').style.display = 'none';
      try {
        const r = await fetch(`https://api.coingecko.com/api/v3/coins/dexe/market_chart?vs_currency=usd&days=${days}`);
        const d = await r.json();
        const prices = d.prices;

        const labels = prices.map(p => {
          const dt = new Date(p[0]);
          return days <= 1
            ? dt.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'})
            : dt.toLocaleDateString('en-US', {month:'short', day:'numeric'});
        });
        const values = prices.map(p => p[1]);

        const gradient = document.getElementById('priceChart').getContext('2d').createLinearGradient(0,0,0,300);
        gradient.addColorStop(0, 'rgba(99,102,241,0.35)');
        gradient.addColorStop(1, 'rgba(99,102,241,0.01)');

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('priceChart'), {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: 'DEXE/USDT',
              data: values,
              borderColor: '#6366f1',
              backgroundColor: gradient,
              borderWidth: 2,
              pointRadius: 0,
              tension: 0.3,
              fill: true,
            }]
          },
          options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#1e293b',
                borderColor: '#334155',
                borderWidth: 1,
                titleColor: '#94a3b8',
                bodyColor: '#e2e8f0',
                callbacks: {
                  label: ctx => ' $' + fmt(ctx.parsed.y, 4)
                }
              }
            },
            scales: {
              x: {
                ticks: { color: '#475569', maxTicksLimit: 8, maxRotation: 0 },
                grid: { color: '#1a2035' }
              },
              y: {
                ticks: { color: '#475569', callback: v => '$' + fmt(v, 4) },
                grid: { color: '#1a2035' }
              }
            }
          }
        });
        document.getElementById('chartLoading').style.display = 'none';
      } catch(e) {
        document.getElementById('chartLoading').style.display = 'none';
        document.getElementById('chartError').style.display = 'block';
        document.getElementById('chartError').textContent = 'Chart load failed: ' + e.message;
      }
    }

    document.querySelectorAll('.tf-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetchChart(btn.dataset.days);
      });
    });

    fetchStats();
    fetchChart(7);
    setInterval(fetchStats, 60000);
  </script>
</body>
</html>
